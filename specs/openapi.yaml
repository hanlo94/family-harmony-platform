openapi: "3.0.3"
info:
  title: 家庭无唠叨协作平台 API
  description: 家庭共享任务管理系统的 RESTful API 接口规范
  version: "1.1.0"
  contact:
    name: 开发团队

servers:
  - url: http://localhost:3001/api
    description: 本地开发环境
  - url: https://your-domain.com/api
    description: 生产环境

tags:
  - name: Auth
    description: 认证（微信登录、Token 刷新）
  - name: User
    description: 用户信息与提醒设置
  - name: Family
    description: 家庭管理与任务统计
  - name: Task
    description: 任务管理（核心）
  - name: Template
    description: 任务模板
  - name: Upload
    description: 文件上传

# ═══════════════════════════════════════════
# 安全定义
# ═══════════════════════════════════════════
security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Access Token，有效期 2 小时

  schemas:
    # ── 通用 ──
    SuccessResponse:
      type: object
      properties:
        code: { type: integer, example: 0 }
        message: { type: string, example: "ok" }
        data: { type: object }

    ErrorResponse:
      type: object
      properties:
        code: { type: integer, example: 40001 }
        message: { type: string, example: "错误描述" }
        detail: { type: string, example: "详细错误信息" }

    PaginatedData:
      type: object
      properties:
        items: { type: array }
        total: { type: integer, example: 100 }
        page: { type: integer, example: 1 }
        pageSize: { type: integer, example: 20 }

    # ── 用户 ──
    UserBrief:
      type: object
      properties:
        id: { type: string, format: uuid }
        nickname: { type: string, example: "小明妈妈" }
        avatarUrl: { type: string, nullable: true, example: "https://..." }

    UserProfile:
      allOf:
        - $ref: "#/components/schemas/UserBrief"
        - type: object
          properties:
            families:
              type: array
              items:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  name: { type: string }
                  role: { type: string, enum: [ORGANIZER, MEMBER, CHILD] }

    # ── 认证 ──
    LoginRequest:
      type: object
      required: [code]
      properties:
        code: { type: string, description: 微信 OAuth code 或 wx.login code }

    LoginResponse:
      type: object
      properties:
        accessToken: { type: string, example: "eyJhbG..." }
        refreshToken: { type: string, example: "eyJhbG..." }
        expiresIn: { type: integer, example: 7200 }
        user: { $ref: "#/components/schemas/UserBrief" }

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }

    RefreshResponse:
      type: object
      properties:
        accessToken: { type: string }
        expiresIn: { type: integer }

    # ── 用户设置 ──
    UserSettings:
      type: object
      properties:
        settings:
          type: array
          items:
            type: object
            properties:
              familyId: { type: string, format: uuid }
              familyName: { type: string }
              reminderEnabled: { type: boolean }

    UpdateUserSettingsRequest:
      type: object
      required: [familyId, reminderEnabled]
      properties:
        familyId: { type: string, format: uuid }
        reminderEnabled: { type: boolean }

    # ── 家庭 ──
    CreateFamilyRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 64, example: "幸福三口之家" }

    FamilyDetail:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        inviteCode: { type: string, example: "ABC123" }
        createdBy: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }

    FamilyWithRole:
      allOf:
        - $ref: "#/components/schemas/FamilyDetail"
        - type: object
          properties:
            role: { type: string, enum: [ORGANIZER, MEMBER, CHILD] }
            memberCount: { type: integer, example: 3 }

    MemberDetail:
      type: object
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        nickname: { type: string }
        avatarUrl: { type: string, nullable: true }
        role: { type: string, enum: [ORGANIZER, MEMBER, CHILD] }
        reminderEnabled: { type: boolean, example: true }
        joinedAt: { type: string, format: date-time }

    InvitationResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string, example: "XYZ789" }
        expiresAt: { type: string, format: date-time }
        inviteUrl: { type: string, example: "https://your-domain.com/invite?code=XYZ789" }

    JoinFamilyRequest:
      type: object
      required: [code]
      properties:
        code: { type: string, example: "XYZ789" }

    JoinFamilyResponse:
      type: object
      properties:
        familyId: { type: string, format: uuid }
        familyName: { type: string }
        role: { type: string, enum: [MEMBER] }

    # ── 家庭统计 ──
    FamilyStatsResponse:
      type: object
      properties:
        members:
          type: array
          items:
            type: object
            properties:
              userId: { type: string, format: uuid }
              nickname: { type: string }
              avatarUrl: { type: string, nullable: true }
              pendingCount: { type: integer, example: 2 }
              weeklyCompletedCount: { type: integer, example: 5 }

    # ── 任务 ──
    CreateTaskRequest:
      type: object
      required: [title, deadline, assignedTo]
      properties:
        title: { type: string, maxLength: 128, example: "今天洗碗" }
        description: { type: string, nullable: true, example: "用洗洁精认真洗" }
        difficulty: { type: integer, minimum: 1, maximum: 5, default: 1 }
        deadline: { type: string, format: date-time, example: "2026-06-10T20:00:00Z" }
        assignedTo:
          type: string
          format: uuid
          description: 执行人用户ID（必填，v1.1不再支持待分配）
        repeatRule:
          type: string
          enum: [NONE, DAILY, WEEKLY]
          default: NONE
          description: 重复规则
        needsVerification:
          type: boolean
          default: false
          description: 是否需要组织者验收

    UpdateTaskRequest:
      type: object
      properties:
        title: { type: string, maxLength: 128 }
        description: { type: string, nullable: true }
        difficulty: { type: integer, minimum: 1, maximum: 5 }
        deadline: { type: string, format: date-time }
        assignedTo: { type: string, format: uuid }
        repeatRule:
          type: string
          enum: [NONE, DAILY, WEEKLY]
        needsVerification: { type: boolean }

    CompleteTaskRequest:
      type: object
      properties:
        completionNote:
          type: string
          nullable: true
          description: 完成备注（可选）
        completionPhoto:
          type: string
          nullable: true
          description: 完成照片URL（可选，先通过 POST /api/upload/image 获取）

    TaskDetail:
      type: object
      properties:
        id: { type: string, format: uuid }
        familyId: { type: string, format: uuid }
        title: { type: string }
        description: { type: string, nullable: true }
        difficulty: { type: integer }
        deadline: { type: string, format: date-time }
        status:
          type: string
          enum: [PENDING_COMPLETION, PENDING_VERIFICATION, REJECTED, COMPLETED, CANCELLED]
        repeatRule:
          type: string
          enum: [NONE, DAILY, WEEKLY]
        needsVerification: { type: boolean }
        assignedTo: { $ref: "#/components/schemas/UserBrief" }
        createdBy: { $ref: "#/components/schemas/UserBrief" }
        completionNote: { type: string, nullable: true }
        completionPhoto: { type: string, nullable: true }
        completedAt: { type: string, format: date-time, nullable: true }
        verifiedAt: { type: string, format: date-time, nullable: true }
        verifiedBy: { $ref: "#/components/schemas/UserBrief" }
        rejectionReason: { type: string, nullable: true }
        cancelledAt: { type: string, format: date-time, nullable: true }
        cancelledBy: { $ref: "#/components/schemas/UserBrief" }
        cancelledReason: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TaskListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        difficulty: { type: integer }
        deadline: { type: string, format: date-time }
        status: { type: string }
        repeatRule: { type: string, enum: [NONE, DAILY, WEEKLY] }
        needsVerification: { type: boolean }
        isOverdue: { type: boolean, description: 计算状态：是否已逾期 }
        isNearExpiry: { type: boolean, description: 计算状态：是否临近到期 }
        assignedTo: { $ref: "#/components/schemas/UserBrief" }
        createdBy: { $ref: "#/components/schemas/UserBrief" }
        createdAt: { type: string, format: date-time }

    RejectTaskRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string, example: "碗没洗干净，请重新洗" }

    CancelTaskRequest:
      type: object
      properties:
        reason: { type: string, nullable: true, example: "今天不在家吃饭" }

    # ── 模板 ──
    TaskTemplateItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string, example: "洗碗" }
        description: { type: string, nullable: true }
        difficulty: { type: integer, minimum: 1, maximum: 5 }
        suggestedRepeatRule:
          type: string
          enum: [NONE, DAILY, WEEKLY]
        needsVerification: { type: boolean }
        category: { type: string, example: "厨房" }
        sortOrder: { type: integer }

    # ── 上传 ──
    UploadResponse:
      type: object
      properties:
        url: { type: string, example: "/uploads/2026/06/10/uuid-photo.jpg" }
        originalName: { type: string, example: "photo.jpg" }
        size: { type: integer, example: 204800 }

# ═══════════════════════════════════════════
# 接口路径
# ═══════════════════════════════════════════
paths:
  # ── Auth ──
  /auth/wechat/h5/login:
    post:
      tags: [Auth]
      summary: H5微信登录
      description: 微信公众号网页授权登录，用 code 换取 JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/LoginResponse" }

  /auth/wechat/mp/login:
    post:
      tags: [Auth]
      summary: 小程序微信登录
      description: 微信小程序登录，用 wx.login code 换取 JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/LoginResponse" }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: 刷新Token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: 刷新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/RefreshResponse" }

  /auth/me:
    get:
      tags: [Auth]
      summary: 获取当前用户信息
      responses:
        "200":
          description: 用户信息
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/UserProfile" }

  # ── User ──
  /users/me:
    patch:
      tags: [User]
      summary: 更新个人资料
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname: { type: string }
                avatarUrl: { type: string }
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/UserBrief" }

  /users/me/settings:
    get:
      tags: [User]
      summary: 获取提醒设置
      description: 获取当前用户在各家庭下的提醒开关状态
      responses:
        "200":
          description: 提醒设置列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/UserSettings" }
    patch:
      tags: [User]
      summary: 更新提醒设置
      description: 更新当前用户在指定家庭下的提醒开关
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserSettingsRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          familyId: { type: string, format: uuid }
                          reminderEnabled: { type: boolean }

  # ── Family ──
  /families:
    post:
      tags: [Family]
      summary: 创建家庭
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFamilyRequest"
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/FamilyDetail" }
    get:
      tags: [Family]
      summary: 我的家庭列表
      responses:
        "200":
          description: 家庭列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/FamilyWithRole" }

  /families/join:
    post:
      tags: [Family]
      summary: 通过邀请码加入家庭
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinFamilyRequest"
      responses:
        "200":
          description: 加入成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/JoinFamilyResponse" }

  /families/{familyId}:
    get:
      tags: [Family]
      summary: 家庭详情
      parameters:
        - { name: familyId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: 家庭详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/FamilyDetail" }

  /families/{familyId}/members:
    get:
      tags: [Family]
      summary: 家庭成员列表
      parameters:
        - { name: familyId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: 成员列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/MemberDetail" }

  /families/{familyId}/tasks/stats:
    get:
      tags: [Family]
      summary: 家庭任务统计
      description: 获取每个成员的当前待办数和本周完成数（轻量公平感）
      parameters:
        - { name: familyId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: 统计数据
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/FamilyStatsResponse" }

  /families/{familyId}/invitations:
    post:
      tags: [Family]
      summary: 生成邀请码
      parameters:
        - { name: familyId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "201":
          description: 邀请码
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/InvitationResponse" }

  /families/{familyId}/members/{memberId}:
    delete:
      tags: [Family]
      summary: 移除家庭成员
      parameters:
        - { name: familyId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: memberId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: 移除成功

  # ── Task ──
  /families/{familyId}/tasks:
    post:
      tags: [Task]
      summary: 创建任务
      description: ORGANIZER 或 MEMBER 可创建；CHILD 默认不可创建
      parameters:
        - { name: familyId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/TaskDetail" }
    get:
      tags: [Task]
      summary: 任务列表
      description: 支持按状态、执行人、逾期/临近到期筛选 + 分页
      parameters:
        - { name: familyId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: status, in: query, schema: { type: string, enum: [PENDING_COMPLETION, PENDING_VERIFICATION, REJECTED, COMPLETED, CANCELLED] } }
        - { name: overdue, in: query, schema: { type: boolean }, description: 筛选已逾期任务 }
        - { name: nearExpiry, in: query, schema: { type: boolean }, description: 筛选临近到期任务 }
        - { name: assignedTo, in: query, schema: { type: string, format: uuid } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: pageSize, in: query, schema: { type: integer, default: 20, maximum: 50 } }
      responses:
        "200":
          description: 任务列表（分页）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/PaginatedData"
                          - type: object
                            properties:
                              items: { type: array, items: { $ref: "#/components/schemas/TaskListItem" } }

  /families/{familyId}/tasks/{taskId}:
    get:
      tags: [Task]
      summary: 任务详情
      parameters:
        - { name: familyId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: taskId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: 任务详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/TaskDetail" }
    patch:
      tags: [Task]
      summary: 编辑任务
      description: 仅 ORGANIZER 可编辑
      parameters:
        - { name: familyId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: taskId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: 编辑成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/TaskDetail" }

  /families/{familyId}/tasks/{taskId}/complete:
    post:
      tags: [Task]
      summary: 标记任务完成
      description: 执行人标记任务完成，可附带备注和照片URL。无需验收的任务直接进入COMPLETED，需要验收的进入PENDING_VERIFICATION。
      parameters:
        - { name: familyId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: taskId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteTaskRequest"
      responses:
        "200":
          description: 标记完成
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id: { type: string, format: uuid }
                          status:
                            type: string
                            enum: [COMPLETED, PENDING_VERIFICATION]
                            description: needsVerification=false→COMPLETED, true→PENDING_VERIFICATION
                          completedAt: { type: string, format: date-time }
                          completionNote: { type: string, nullable: true }
                          completionPhoto: { type: string, nullable: true }

  /families/{familyId}/tasks/{taskId}/verify:
    post:
      tags: [Task]
      summary: 验收通过
      description: 仅 ORGANIZER 可操作
      parameters:
        - { name: familyId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: taskId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: 验收通过
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id: { type: string, format: uuid }
                          status: { type: string, example: "COMPLETED" }
                          verifiedAt: { type: string, format: date-time }
                          verifiedBy: { $ref: "#/components/schemas/UserBrief" }

  /families/{familyId}/tasks/{taskId}/reject:
    post:
      tags: [Task]
      summary: 驳回任务
      description: 仅 ORGANIZER 可操作，驳回原因必填，任务进入 REJECTED 状态
      parameters:
        - { name: familyId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: taskId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectTaskRequest"
      responses:
        "200":
          description: 已驳回
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id: { type: string, format: uuid }
                          status: { type: string, example: "REJECTED" }
                          rejectionReason: { type: string }

  /families/{familyId}/tasks/{taskId}/cancel:
    post:
      tags: [Task]
      summary: 取消任务
      description: ORGANIZER 可取消任何任务，MEMBER 仅可取消自己创建的任务
      parameters:
        - { name: familyId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: taskId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelTaskRequest"
      responses:
        "200":
          description: 已取消
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id: { type: string, format: uuid }
                          status: { type: string, example: "CANCELLED" }
                          cancelledAt: { type: string, format: date-time }
                          cancelledReason: { type: string, nullable: true }

  # ── Template ──
  /task-templates:
    get:
      tags: [Template]
      summary: 获取任务模板列表
      description: 获取内置任务模板，用于快速创建常见家务任务
      parameters:
        - { name: category, in: query, schema: { type: string }, description: 按分类筛选（可选） }
      responses:
        "200":
          description: 模板列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          templates:
                            type: array
                            items: { $ref: "#/components/schemas/TaskTemplateItem" }

  # ── Upload ──
  /upload/image:
    post:
      tags: [Upload]
      summary: 上传图片
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary, description: "图片文件（jpg/png/webp，最大5MB）" }
      responses:
        "200":
          description: 上传成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/UploadResponse" }
